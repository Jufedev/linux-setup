<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Color emoji fallback.

  Having an emoji font installed (e.g. Apple Color Emoji) is NOT enough: by
  default fontconfig does not chain it into the generic families, so browsers
  and apps render emoji as tofu boxes. This config:
    1. makes "Apple Color Emoji" the preferred "emoji" family, and
    2. appends it as a weak fallback for sans-serif / serif / monospace.

  Install to ~/.config/fontconfig/conf.d/ (per-user) and run `fc-cache -f`.
  Distro-agnostic — shared by the Arch and Fedora setups.
-->
<fontconfig>
  <alias>
    <family>emoji</family>
    <prefer><family>Apple Color Emoji</family></prefer>
  </alias>

  <match target="pattern">
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="append" binding="weak"><string>Apple Color Emoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="append" binding="weak"><string>Apple Color Emoji</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="append" binding="weak"><string>Apple Color Emoji</string></edit>
  </match>
</fontconfig>
